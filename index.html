<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Biblioteca - Instituto Tibagi</title>

  <!-- FONTE -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
      color:#333;
    }

    /* =========================
       CABEÇALHO
    ========================== */

    header{
      width:100%;
      padding:35px 20px;
      display:flex;
      justify-content:center;
      align-items:center;

      /* CORES DOS BONECOS */
      background: linear-gradient(
        90deg,
        #00B7E8 0%,
        #F4C20D 50%,
        #F25C5C 100%
      );

      box-shadow:0 2px 8px rgba(0,0,0,0.15);

      margin-bottom:30px;
    }

    .logo-texto{
      font-family:'Montserrat', sans-serif;
      font-size:52px;
      font-weight:800;
      letter-spacing:6px;
      color:white;
      text-transform:uppercase;
      text-align:center;
      text-shadow:2px 2px 6px rgba(0,0,0,0.2);
    }

    /* =========================
       CONTAINER
    ========================== */

    .container{
      width:90%;
      max-width:1000px;
      margin:auto;
    }

    /* =========================
       CARDS
    ========================== */

    .card{
      background:white;
      border-radius:12px;
      padding:25px;
      margin-bottom:25px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    h2{
      margin-bottom:20px;
      color:#111;
      font-size:24px;
    }

    /* =========================
       FORMULÁRIO
    ========================== */

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:15px;
      transition:0.3s;
    }

    input:focus{
      outline:none;
      border-color:#0077cc;
      box-shadow:0 0 5px rgba(0,119,204,0.3);
    }

    button{
      border:none;
      background:#0077cc;
      color:white;
      padding:12px;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:#005fa3;
    }

    /* =========================
       ALERTA
    ========================== */

    .alerta{
      color:red;
      font-weight:bold;
      margin-bottom:15px;
    }

    /* =========================
       REGISTROS
    ========================== */

    .registros{
      display:grid;
      gap:15px;
    }

    .registro{
      background:#fafafa;
      border-left:5px solid #0077cc;
      padding:18px;
      border-radius:8px;
    }

    .registro p{
      margin-bottom:8px;
    }

    .registro button{
      margin-top:10px;
      background:#d9534f;
    }

    .registro button:hover{
      background:#b52b27;
    }

    /* =========================
       RESPONSIVO
    ========================== */

    @media(max-width:700px){

      form{
        grid-template-columns:1fr;
      }

      .logo-texto{
        font-size:34px;
        letter-spacing:3px;
      }

    }

  </style>
</head>
<body>

  <!-- =========================
       CABEÇALHO
  ========================== -->

  <header>

    <div class="logo-texto">
      Instituto Tibagi
    </div>

  </header>

  <!-- =========================
       CONTEÚDO
  ========================== -->

  <div class="container">

    <!-- FORMULÁRIO -->

    <div class="card">

      <h2>Registro de Empréstimo de Livros</h2>

      <div class="alerta" id="alerta"></div>

      <form id="formulario">

        <div>
          <label>Nome</label>
          <input type="text" id="nome" required>
        </div>

        <div>
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div>
          <label>Telefone</label>
          <input type="tel" id="telefone" required>
        </div>

        <div>
          <label>Livro Emprestado</label>
          <input type="text" id="livro" required>
        </div>

        <div>
          <label>Data do Empréstimo</label>
          <input type="date" id="dataEmprestimo" required>
        </div>

        <div>
          <label>Data da Devolução</label>
          <input type="date" id="dataDevolucao" readonly>
        </div>

        <div class="full">
          <button type="submit">
            Registrar Empréstimo
          </button>
        </div>

      </form>

    </div>

    <!-- REGISTROS -->

    <div class="card">

      <h2>Últimos Registros</h2>

      <div class="registros" id="listaRegistros"></div>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->

  <script>

    const formulario = document.getElementById("formulario");
    const listaRegistros = document.getElementById("listaRegistros");
    const alerta = document.getElementById("alerta");

    const dataEmprestimo = document.getElementById("dataEmprestimo");
    const dataDevolucao = document.getElementById("dataDevolucao");

    // RECUPERA REGISTROS

    let registros = JSON.parse(
      localStorage.getItem("bibliotecaRegistros")
    ) || [];

    atualizarTela();

    // =========================
    // CALCULAR DEVOLUÇÃO
    // =========================

    dataEmprestimo.addEventListener("change", () => {

      if(dataEmprestimo.value){

        let data = new Date(dataEmprestimo.value);

        // +15 DIAS
        data.setDate(data.getDate() + 15);

        let ano = data.getFullYear();
        let mes = String(data.getMonth() + 1).padStart(2, "0");
        let dia = String(data.getDate()).padStart(2, "0");

        dataDevolucao.value = `${ano}-${mes}-${dia}`;
      }

    });

    // =========================
    // ENVIAR FORMULÁRIO
    // =========================

    formulario.addEventListener("submit", (e) => {

      e.preventDefault();

      alerta.innerHTML = "";

      // LIMITE DE 3 REGISTROS

      if(registros.length >= 3){

        alerta.innerHTML =
          "Limite máximo de 3 empréstimos atingido.";

        return;
      }

      const novoRegistro = {

        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        telefone: document.getElementById("telefone").value,
        livro: document.getElementById("livro").value,
        emprestimo: dataEmprestimo.value,
        devolucao: dataDevolucao.value

      };

      // ADICIONA NO INÍCIO

      registros.unshift(novoRegistro);

      // SALVA

      localStorage.setItem(
        "bibliotecaRegistros",
        JSON.stringify(registros)
      );

      // LIMPA FORMULÁRIO

      formulario.reset();

      dataDevolucao.value = "";

      atualizarTela();

    });

    // =========================
    // MOSTRAR REGISTROS
    // =========================

    function atualizarTela(){

      listaRegistros.innerHTML = "";

      if(registros.length === 0){

        listaRegistros.innerHTML = `
          <p>Nenhum registro encontrado.</p>
        `;

        return;
      }

      registros.forEach((registro, index) => {

        listaRegistros.innerHTML += `

          <div class="registro">

            <p>
              <strong>Nome:</strong>
              ${registro.nome}
            </p>

            <p>
              <strong>Email:</strong>
              ${registro.email}
            </p>

            <p>
              <strong>Telefone:</strong>
              ${registro.telefone}
            </p>

            <p>
              <strong>Livro:</strong>
              ${registro.livro}
            </p>

            <p>
              <strong>Data do Empréstimo:</strong>
              ${registro.emprestimo}
            </p>

            <p>
              <strong>Data da Devolução:</strong>
              ${registro.devolucao}
            </p>

            <button onclick="removerRegistro(${index})">
              Remover Registro
            </button>

          </div>

        `;
      });

    }

    // =========================
    // REMOVER REGISTRO
    // =========================

    function removerRegistro(index){

      registros.splice(index, 1);

      localStorage.setItem(
        "bibliotecaRegistros",
        JSON.stringify(registros)
      );

      atualizarTela();

    }

  </script>

</body>
</html>
